version: '3.8'

services:
  pocketbase:
    image: ghcr.io/marcb/pocketbase:latest
    container_name: ai-music-pb
    restart: unless-stopped
    ports:
      - "8090:8090"
    volumes:
      - pb_data:/pb/pb_data
      - pb_public:/pb/pb_public
      - ./pocketbase/pb_hooks:/pb/pb_hooks
      - ./pocketbase/pb_migrations:/pb/pb_migrations
    environment:
      - PB_ENCRYPTION_KEY=${PB_ENCRYPTION_KEY:-default-key-change-me}

  sveltekit:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-music-ui
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - PUBLIC_POCKETBASE_URL=${PUBLIC_POCKETBASE_URL:-http://pocketbase:8090}
      - NODE_ENV=production
    depends_on:
      - pocketbase

volumes:
  pb_data:
  pb_public:
