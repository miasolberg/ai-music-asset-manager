<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Music Asset Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white">
    <div class="container mx-auto px-4 py-8">
        <h1 class="text-3xl font-bold mb-8">AI Music Asset Manager</h1>
        
        <div class="bg-gray-800 rounded-lg p-6 mb-6">
            <h2 class="text-xl font-semibold mb-4">Create New Project</h2>
            <form id="projectForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-2">Title</label>
                    <input type="text" name="title" required class="w-full px-3 py-2 bg-gray-700 rounded-lg text-white">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-2">Artist</label>
                    <input type="text" name="artist" class="w-full px-3 py-2 bg-gray-700 rounded-lg text-white">
                </div>
                <button type="submit" class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded-lg">
                    Create Project
                </button>
            </form>
        </div>
        
        <div class="bg-gray-800 rounded-lg p-6">
            <h2 class="text-xl font-semibold mb-4">Projects</h2>
            <div id="projectsList" class="space-y-4">
                <p class="text-gray-400">No projects yet.</p>
            </div>
        </div>
    </div>
    
    <script>
        document.getElementById('projectForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const response = await fetch('/api/projects', {
                method: 'POST',
                body: formData
            });
            const data = await response.json();
            console.log('Created:', data);
            location.reload();
        });
    </script>
</body>
</html>
